<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="with=device_width, initial-scale=1.0">
  <title>Greenhouse</title>
  <link rel="stylesheet" href="static/styles.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
  </style>
</head>

<body>
  <div class="title">
    <h1>Online Greenhouse</h1>
  </div>

  <div class="subtitle-cont">
    <div>
      <h2>Live Sensor Data</h2>

    </div>
    <div>
      <h2>Control Panel</h2>
    </div>
  </div>

  <div class="data_display">
    <p>Temperature: <span id="temp" ></span></p>
    <p>Soil Humidity: <span id="soil"></span></p>
    <p>Air Humidity: <span id="air"></span></p>
    <p>Brightness: <span id="brightness"></span></p>
    <p>Fan Speed: <span id="fanspeed"></span></p>
  </div>


  <script>
    async function update() {
    const res = await fetch('/data');
    const data = await res.json();

    document.getElementById("temp").innerText = data.temp;
    document.getElementById("soil").innerText = data.soil;
    document.getElementById("air").innerText = data.air;
    document.getElementById("brightness").innerText = data.brightness;
    document.getElementById("fanspeed").innerText = data.fanspeed;
    }

    setInterval(update, 1000);
  </script>
</body>
</html>
